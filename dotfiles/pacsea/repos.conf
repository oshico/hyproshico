# Pacsea third-party repository definitions (TOML)
#
# Each active [[repo]] needs at least:
#   name            — pacman [repo] section name (lowercase match in search)
#   results_filter  — group id for results visibility; see settings.conf
#
# Optional metadata (for future apply-to-system): id, enabled, server, sig_level, keys, mirrorlist, …
#
# Copy/paste rows from the optional examples file (not loaded automatically):
#   https://github.com/Firstp1ck/Pacsea/blob/main/config/examples/repos_example.conf
#   (or config/examples/repos_example.conf in a source checkout)
#
# Hyphens in results_filter are normalized; prefer alphanumeric + underscores so
# settings.conf keys stay clear: results_filter_show_<token> = true|false
#
# ---------------------------------------------------------------------------
# Example [[repo]] (commented — uncomment and edit; verify mirrors and keys with upstream docs)
# ---------------------------------------------------------------------------
# [[repo]]
# name = "myrepo"
# results_filter = "third_party"
# server = "https://mirror.example.com/$repo/$arch"
# sig_level = "PackageRequired"
#
# Optional for Options → Repositories → Apply: mirrorlist, mirrorlist_url, key_id, key_server, enabled
# Full recipes: config/examples/repos_example.conf in the Pacsea source tree (or press s in that modal)
